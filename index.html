<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FBFBF9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#15171C" media="(prefers-color-scheme: dark)" />

    <script>
      (() => {
        try {
          const stored = localStorage.getItem('daybreak:theme');
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          const isDark = stored === 'dark' || (stored !== 'light' && prefersDark);
          document.documentElement.classList.toggle('dark', isDark);
        } catch {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
      <link rel="preload" href="fonts/Isego.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
      <link rel="preload" href="fonts/MPLUS2.woff2" as="font" type="font/woff2" crossorigin="anonymous" />

    <title>Daybreak - Your Weight Journey</title>
  </head>
